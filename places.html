<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Bean Dong places and work memories." />
    <title>Places | Bean Dong</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260611-2" />
  </head>
  <body data-page="places">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Bean Dong home">
        <span class="brand-monogram" aria-hidden="true">BD</span>
        <span>Bean Dong</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html" data-nav="home">Home</a>
        <a href="work.html" data-nav="work">Work</a>
        <a href="resume.html" data-nav="resume">Resume</a>
        <a href="places.html" data-nav="places">Places</a>
        <a href="life.html" data-nav="life">Life</a>
        <a href="contact.html" data-nav="contact">Contact</a>
      </nav>
    </header>

    <main class="visual-page places-page">
      <section class="visual-hero-section">
        <div class="visual-hero-card places-visual-hero">
          <img class="visual-hero-image" id="places-hero-image" alt="" hidden />
          <div class="visual-hero-overlay" aria-hidden="true"></div>
          <div class="visual-hero-copy">
            <p class="visual-eyebrow">Working Footprint</p>
            <h1 data-bind="placesPage.heroTitle"></h1>
            <p data-bind="placesPage.heroSubtitle"></p>
          </div>
        </div>
      </section>

      <section class="visual-intro">
        <p>
          <span data-bind="placesPage.introLead"></span>
          <span class="visual-intro-muted" data-bind="placesPage.introBody"></span>
        </p>
      </section>

      <section class="visual-feature-grid places-grid" id="places-grid" aria-label="Working footprint"></section>

      <section class="footprint-gallery" aria-labelledby="footprint-gallery-title">
        <div class="footprint-gallery-heading">
          <p class="visual-eyebrow" data-bind="placesPage.galleryEyebrow"></p>
          <h2 id="footprint-gallery-title" data-bind="placesPage.galleryTitle"></h2>
          <p data-bind="placesPage.galleryBody"></p>
        </div>
        <div class="footprint-photo-grid" id="footprint-photo-grid"></div>
      </section>

      <section class="places-journey">
        <h2 data-bind="placesPage.journeyTitle"></h2>
        <p data-bind="placesPage.journeyBody"></p>
        <div class="places-route" id="places-route" aria-label="Professional journey route"></div>
      </section>

      <section class="visual-finale places-finale">
        <div>
          <p class="visual-finale-kicker">Next chapter</p>
          <h2 data-bind="placesPage.finaleTitle"></h2>
          <div class="places-finale-visual" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Bean Dong</span>
      <span>A professional journey across cities and project phases.</span>
    </footer>

    <script src="script.js?v=20260611-2"></script>
  </body>
</html>
